[tools]
ghcup = "latest"

[tasks.build]
description = "Build the project"
run = """
export PATH="$HOME/.ghcup/bin:$PATH"
cabal build
"""

[tasks.dev]
description = "Build and run the full runtime pipeline demo"
depends = ["build"]
run = """
export PATH="$HOME/.ghcup/bin:$PATH"
cabal run mreact-demo
"""
