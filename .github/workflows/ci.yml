name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Vite Task
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Build
        run: nix develop --impure --command vp run ci
